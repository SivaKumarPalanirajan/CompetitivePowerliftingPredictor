version: '3.9'
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8080:7860"
  
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit 
    ports: 
      - "8000:7860"
    environment:
      - API_ENDPOINT=http://api:7860/predict
    depends_on:
      - api

